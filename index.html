<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BKash</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-[#E2136E] h-[100vh] flex flex-col justify-center items-center">

    <div class="h-[120px] w-[120px] rounded-2xl bg-cover flex justify-center items">
     <img src="./assets/bg.png" alt="">
    </div>

    <form class="w-[300px] bg-white rounded-2xl p-5 mt-5 ">
        <div>
            <label for="">Mobile Number</label>
            <br>
            <input type="text" placeholder="Enter your number" class="input bg-[#f4f5f7] mt-3 rounded-3xl" />
        </div>
        
        <div class="mt-5">
            <label for="">4 Digit Pin</label>
            <br>
            <input type="text" placeholder="Enter 4 Digit Pin" class="input bg-[#f4f5f7] mt-3 rounded-3xl" />
        </div>

        <button class="btn text-white bg-[#E2136E] mt-5 w-full rounded-3xl">Login</button>
    </form>

  </body>
</html>
